# Render Blueprint para desplegar Backend + PostgreSQL
# Documentación: https://render.com/docs/blueprint-spec

services:
  # Servicio Web (Backend Flask)
  - type: web
    name: tareas-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tareas-db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: false
      - key: PORT
        value: 8000
      - key: FRONTEND_URL
        sync: false  # Configurar manualmente en Render dashboard

databases:
  # Base de datos PostgreSQL
  - name: tareas-db
    databaseName: tareas
    user: tareas_user
    plan: free
    region: oregon
